name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard-typecheck:
    name: Dashboard TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit

  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    needs: dashboard-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Vitest
        run: npm test
        env:
          # Self-contained tests use placeholders so module imports that
          # touch process.env on load don't crash the runner.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-placeholder
          SUPABASE_SERVICE_ROLE_KEY: service-placeholder
          NEXT_PUBLIC_SITE_URL: https://example.com

  health-endpoint-smoke:
    name: /api/agent/health smoke test
    runs-on: ubuntu-latest
    needs: dashboard-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: Start + curl health
        run: |
          npm start &
          SERVER_PID=$!
          # Wait up to 30s for server to come up
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/agent/health; then
              echo ""
              echo "✅ Health endpoint responding"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "❌ Health endpoint never responded"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
