# gitleaks config — run before every commit.
# Install: `brew install gitleaks` on Mac / `scoop install gitleaks` on Windows
# Pre-commit hook: see .husky/pre-commit in the repo.

[extend]
useDefault = true

[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service-role JWT"
regex = '''eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{50,}\.[a-zA-Z0-9_-]{30,}'''
tags = ["jwt","supabase"]

[[rules]]
id = "supabase-mgmt-pat"
description = "Supabase Management PAT"
regex = '''sbp_[a-f0-9]{40,}'''

[[rules]]
id = "composio-api-key"
description = "Composio API key"
regex = '''(?i)composio[_-]?api[_-]?key['"=: ]+['"]?[a-zA-Z0-9_-]{20,}'''

[[rules]]
id = "resend-api-key"
description = "Resend API key"
regex = '''re_[a-zA-Z0-9]{20,}'''

[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''[0-9]{9,10}:[A-Za-z0-9_-]{30,}'''

[[rules]]
id = "twilio-auth-token"
description = "Twilio auth token (32 hex)"
regex = '''(?i)(auth[_-]?token|AC[a-f0-9]{32})['"=: ]+['"]?[a-f0-9]{32}'''

[[rules]]
id = "gmail-app-password"
description = "Gmail 16-char app password"
regex = '''(?i)(smtp_?pass|app[_-]?password)['"=: ]+['"]?[a-z]{16}'''

[allowlist]
paths = [
  '''node_modules/.*''',
  '''.next/.*''',
  '''dist/.*''',
  '''\.env\.local''',   # allow local-only envs (git-ignored)
]
